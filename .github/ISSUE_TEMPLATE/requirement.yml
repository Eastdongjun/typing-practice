name: 需求申请
description: 提交新需求或需求变更
title: "[需求] "
labels: ["requirement"]
body:
  - type: markdown
    attributes:
      value: "## 需求基本信息"
  - type: input
    id: requester
    attributes:
      label: 提出人
      placeholder: 姓名 / 部门
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: 背景与问题
      description: 当前遇到什么问题？为什么需要这个需求？
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 希望达到什么效果？
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围说明
      description: 本次需要做哪些？明确不做什么？
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P0-紧急
        - P1-高
        - P2-中
        - P3-低
    validations:
      required: true
  - type: input
    id: reviewer
    attributes:
      label: 需求评审人
      placeholder: 指定业务/技术评审人
  - type: input
    id: acceptor
    attributes:
      label: 验收人
      placeholder: 最终确认需求完成的人
  - type: textarea
    id: attachments
    attributes:
      label: 附件与参考资料
      description: 链接、截图、样表、会议纪要等
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 已确认不包含密码、令牌、个人隐私信息
          required: true
        - label: 已明确本期范围和非范围
          required: false
